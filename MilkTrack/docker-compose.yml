version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "milkTrack"
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "4777:5432"
    restart: unless-stopped

volumes:
  db_data:
